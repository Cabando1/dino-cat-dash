name: Validate Cutscenes and Boss Ammo

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cutscene-reliability:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check reliability script syntax
        run: node --check js/cutscene-reliability.js
      - name: Test power guide, boss intro, and boss ammo
        run: node tests/cutscene-reliability.test.js
