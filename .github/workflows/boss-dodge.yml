name: Validate Boss Dodge Window

on:
  pull_request:
    paths:
      - 'js/mechanics.js'
      - 'js/boss-visual-fix.js'
      - 'tests/boss-dodge-test.js'
      - '.github/workflows/boss-dodge.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boss-dodge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check game syntax
        run: |
          node --check js/mechanics.js
          node --check js/boss-visual-fix.js
      - name: Test every boss attack pattern
        run: node tests/boss-dodge-test.js
